name: Deploy to Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'google_cloud_functions/gmail/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Write env vars file
        run: |
          cat > /tmp/env.yaml <<EOF
          ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
          GOOGLE_SERVICE_ACCOUNT_JSON: $(echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip()))")
          EOF

      - name: Deploy
        run: |
          gcloud functions deploy gmail-routine \
            --gen2 \
            --runtime=python312 \
            --region=us-central1 \
            --source=google_cloud_functions/gmail \
            --entry-point=run_gmail_routine \
            --trigger-http \
            --no-allow-unauthenticated \
            --env-vars-file=/tmp/env.yaml

      - name: Print URL
        run: |
          gcloud functions describe gmail-routine \
            --gen2 \
            --region=us-central1 \
            --format="value(serviceConfig.uri)"
