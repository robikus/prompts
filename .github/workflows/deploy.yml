name: Deploy to Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'google_cloud_functions/gmail/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Write env vars file
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_TOKEN_ROBERT: ${{ secrets.GMAIL_TOKEN_ROBERT }}
          GMAIL_TOKEN_KATERINA: ${{ secrets.GMAIL_TOKEN_KATERINA }}
        run: |
          python3 -c "
          import os, json, yaml
          env = {
            'ANTHROPIC_API_KEY': os.environ['ANTHROPIC_API_KEY'],
            'GMAIL_TOKEN_ROBERT': os.environ['GMAIL_TOKEN_ROBERT'],
            'GMAIL_TOKEN_KATERINA': os.environ['GMAIL_TOKEN_KATERINA'],
          }
          with open('/tmp/env.yaml', 'w') as f:
            yaml.dump(env, f, default_flow_style=False)
          "

      - name: Deploy
        run: |
          gcloud functions deploy gmail-routine \
            --gen2 \
            --runtime=python312 \
            --region=us-central1 \
            --source=google_cloud_functions/gmail \
            --entry-point=run_gmail_routine \
            --trigger-http \
            --no-allow-unauthenticated \
            --env-vars-file=/tmp/env.yaml

      - name: Print URL
        run: |
          gcloud functions describe gmail-routine \
            --gen2 \
            --region=us-central1 \
            --format="value(serviceConfig.uri)"