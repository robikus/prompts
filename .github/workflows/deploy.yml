name: Deploy to Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'google_cloud_functions/gmail/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - id: deploy
        uses: google-github-actions/deploy-cloud-functions@v4
        with:
          name: gmail-routine
          runtime: python312
          source_dir: google_cloud_functions/gmail
          entry_point: run_gmail_routine
          region: us-central1
          env_vars: 'ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},GOOGLE_SERVICE_ACCOUNT_JSON=${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}'

      - name: Print URL
        run: echo "Function URL ${{ steps.deploy.outputs.url }}"
